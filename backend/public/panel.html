<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel · Reservas recibidas</title>
    <link rel="stylesheet" href="css/panel.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="panel-header">
      <div class="panel-header__brand">Fjs</div>
      <h1 class="panel-header__title">Reservas recibidas</h1>
      <button class="panel-header__logout">Salir</button>
    </header>

    <main class="panel-container">
      <!-- Resumen -->
      <section class="panel-summary">
        <div class="summary-card">
          <span class="summary-label">Pendientes</span>
          <span class="summary-value">3</span>
        </div>

        <div class="summary-card">
          <span class="summary-label">Fotos reservadas</span>
          <span class="summary-value">18</span>
        </div>
      </section>

      <div class="filters">
        <button class="filter-btn active" data-filter="todas">Todas</button>
        <button class="filter-btn" data-filter="pendiente">Pendientes</button>
        <button class="filter-btn" data-filter="confirmado">Confirmadas</button>
        <button class="filter-btn" data-filter="cancelada">Canceladas</button>
      </div>

      <!-- Lista de reservas -->
      <section class="reservations" id="reservationsList"></section>
    </main>

    <div class="modal-backdrop hidden" id="modalBackdrop"></div>

    <div class="modal hidden" id="reservaModal">
      <div class="modal-header">
        <h2>Detalle de reserva</h2>

        <button id="modalClose">✕</button>
      </div>
      <div class="modal-content" id="modalContent">
        
      </div>
      <button class="btn-primary" id="contactarBtn">
           Contactar por email
      </button>

    </div>

    <script src="./js/panel.js"></script>
  </body>
</html>
